name: CI

on:
  push:
    branches: [ main ]

jobs:
  full-test:
    name: Full test suite (no -short)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run full test suite
        run: bash scripts/ci/full_test.sh

  chaos:
    name: Container chaos tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run chaos suite
        run: bash scripts/chaos/test_chaos.sh
