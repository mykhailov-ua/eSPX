name: Perf Nightly

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

env:
  GOMAXPROCS: "1"

jobs:
  escape-report:
    name: Escape analysis regression
    runs-on: ${{ vars.PERF_RUNNER_LABEL || 'ubuntu-latest' }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Restore escape baseline
        uses: actions/cache@v4
        with:
          path: .ci-baselines/escape
          key: nightly-escape-${{ github.sha }}
          restore-keys: |
            nightly-escape-

      - name: Stabilize CPU
        run: bash scripts/stabilize-cpu.sh

      - name: Escape report and regression gate
        run: |
          mkdir -p .ci-baselines/escape
          bash scripts/escape-nightly-job.sh escape_report.txt .ci-baselines/escape/heap_lines.count

      - uses: actions/upload-artifact@v4
        with:
          name: escape-analysis
          path: escape_report.txt

      - name: Save escape baseline
        uses: actions/cache/save@v4
        with:
          path: .ci-baselines/escape
          key: nightly-escape-${{ github.sha }}

  redis-lua-bench:
    name: UnifiedFilter Redis bench regression
    runs-on: ${{ vars.PERF_RUNNER_LABEL || 'ubuntu-latest' }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Restore redis bench baseline
        uses: actions/cache@v4
        with:
          path: .ci-baselines/redis
          key: nightly-redis-${{ github.sha }}
          restore-keys: |
            nightly-redis-

      - name: Stabilize CPU
        run: bash scripts/stabilize-cpu.sh

      - name: Benchmark and regression gate
        run: bash scripts/nightly-bench-job.sh redis

      - uses: actions/upload-artifact@v4
        with:
          name: redis-lua-bench
          path: |
            redis_lua_bench.txt
            redis_lua_gate.txt

      - name: Save redis bench baseline
        uses: actions/cache/save@v4
        with:
          path: .ci-baselines/redis
          key: nightly-redis-${{ github.sha }}

  broker-protocol-bench:
    name: Broker protocol bench regression
    runs-on: ${{ vars.PERF_RUNNER_LABEL || 'ubuntu-latest' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Restore broker bench baseline
        uses: actions/cache@v4
        with:
          path: .ci-baselines/broker
          key: nightly-broker-${{ github.sha }}
          restore-keys: |
            nightly-broker-

      - name: Stabilize CPU
        run: bash scripts/stabilize-cpu.sh

      - name: Benchmark and regression gate
        run: bash scripts/nightly-bench-job.sh broker

      - uses: actions/upload-artifact@v4
        with:
          name: broker-protocol-bench
          path: |
            broker_proto_bench.txt
            broker_proto_gate.txt

      - name: Save broker bench baseline
        uses: actions/cache/save@v4
        with:
          path: .ci-baselines/broker
          key: nightly-broker-${{ github.sha }}

  chaos-weekly:
    name: Container chaos tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run chaos suite
        run: bash scripts/test-chaos.sh
