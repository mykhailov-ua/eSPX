name: Sentinel Chaos

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sentinel-failover:
    name: Redis Sentinel failover chaos
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Prepare env
        run: bash scripts/sentinel-chaos-env.sh

      - name: Sentinel failover chaos test
        run: bash scripts/test-sentinel-failover.sh
