services:
  tracker-0:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/tracker"]
    network_mode: host
    env_file:
      - .env
    environment:
      - SERVER_PORT=8081
      - GOMEMLIMIT=700MiB
      - GOGC=50
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  tracker-1:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/tracker"]
    network_mode: host
    env_file:
      - .env
    environment:
      - SERVER_PORT=8082
      - GOMEMLIMIT=700MiB
      - GOGC=50
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  tracker-2:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/tracker"]
    network_mode: host
    env_file:
      - .env
    environment:
      - SERVER_PORT=8083
      - GOMEMLIMIT=700MiB
      - GOGC=50
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  tracker-3:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/tracker"]
    network_mode: host
    env_file:
      - .env
    environment:
      - SERVER_PORT=8084
      - GOMEMLIMIT=700MiB
      - GOGC=50
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8084/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  nginx:
    image: nginx:stable-alpine
    network_mode: host
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - tracker-0
      - tracker-1
      - tracker-2
      - tracker-3
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    deploy:
      resources:
        limits:
          memory: 1G
    restart: always

  processor:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/processor"]
    env_file:
      - .env
    ports:
      - "${PROCESSOR_PORT}:${PROCESSOR_PORT}"
    environment:
      - DB_DSN=${DB_DSN}
      - REDIS_ADDRS=localhost:6379,localhost:6380,localhost:6381,localhost:6382,localhost:6383,localhost:6384
      - CH_DSN=${CH_DSN}
      - PROCESSOR_PORT=${PROCESSOR_PORT}
      - DB_PROCESSOR_MAX_CONNS=16
      - GOMEMLIMIT=1500MiB
      - GOGC=100
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8086/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - database
      - monitoring
    depends_on:
      db:
        condition: service_healthy
      redis-0:
        condition: service_healthy
      clickhouse:
        condition: service_started

  db:
    image: postgres:${POSTGRES_VERSION}
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "${DB_PORT}:${DB_PORT}"
    command: ["postgres", "-p", "${DB_PORT}"]
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p ${DB_PORT} -U ${DB_USER}"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}
    deploy:
      resources:
        limits:
          memory: 1G

  redis-0:
    image: redis:${REDIS_VERSION}
    env_file:
      - .env
    ports:
      - "6379:6379"
    command: ["redis-server", "--port", "6379", "--requirepass", "${REDIS_PASSWORD}", "--save", ""]
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - database
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}

  redis-1:
    image: redis:${REDIS_VERSION}
    env_file:
      - .env
    ports:
      - "6380:6379"
    command: ["redis-server", "--port", "6379", "--requirepass", "${REDIS_PASSWORD}", "--save", ""]
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - database
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}

  redis-2:
    image: redis:${REDIS_VERSION}
    env_file:
      - .env
    ports:
      - "6381:6379"
    command: ["redis-server", "--port", "6379", "--requirepass", "${REDIS_PASSWORD}", "--save", ""]
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - database
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}

  redis-3:
    image: redis:${REDIS_VERSION}
    env_file:
      - .env
    ports:
      - "6382:6379"
    command: ["redis-server", "--port", "6379", "--requirepass", "${REDIS_PASSWORD}", "--save", ""]
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - database
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}

  redis-4:
    image: redis:${REDIS_VERSION}
    env_file:
      - .env
    ports:
      - "6383:6379"
    command: ["redis-server", "--port", "6379", "--requirepass", "${REDIS_PASSWORD}", "--save", ""]
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - database
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}

  redis-5:
    image: redis:${REDIS_VERSION}
    env_file:
      - .env
    ports:
      - "6384:6379"
    command: ["redis-server", "--port", "6379", "--requirepass", "${REDIS_PASSWORD}", "--save", ""]
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - database
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    env_file:
      - .env
    ports:
      - "${CH_PORT}:${CH_PORT}"
      - "8123:8123"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./deploy/clickhouse/config.xml:/etc/clickhouse-server/config.d/memory_limit.xml:ro
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - database
      - monitoring
    environment:
      - CLICKHOUSE_DB=${CH_NAME}
      - CLICKHOUSE_USER=${CH_USER}
      - CLICKHOUSE_PASSWORD=${CH_PASSWORD}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    healthcheck:
      disable: true

  prometheus:
    image: prom/prometheus:latest
    network_mode: host
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    deploy:
      resources:
        limits:
          memory: 512M

  grafana:
    image: grafana/grafana:latest
    network_mode: host
    volumes:
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    deploy:
      resources:
        limits:
          memory: 512M

  k6:
    image: grafana/k6:latest
    volumes:
      - ./tests/load:/scripts
    network_mode: host

networks:
  frontend:
  backend:
  database:
  monitoring:

volumes:
  db_data:
  clickhouse_data:
