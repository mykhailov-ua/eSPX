# DO NOT run buf from repo root. Use: bash scripts/codegen/gen.sh --proto
# api/buf.gen.yml is the only template; out must stay a relative staging dir (gen -> api/gen/).
version: v1
plugins:
  - plugin: buf.build/protocolbuffers/go
    out: gen
    opt:
      - module=espx
  - plugin: buf.build/grpc/go
    out: gen
    opt:
      - module=espx
  - name: go-vtproto
    out: gen
    opt:
      - module=espx
      - features=marshal+unmarshal+size+pool

