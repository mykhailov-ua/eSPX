# eSPX local stack. Default NET_MODE=host binds services on loopback ports documented in docs/development.md.
# Ingestion (trackers + nginx) and observability use host networking; stateful stores sit on the database network.

x-redis-replica: &redis-replica
  image: redis:${REDIS_VERSION}
  env_file:
    - .env
  networks:
    - database
  deploy:
    resources:
      limits:
        memory: 512M
  healthcheck:
    test: ["CMD", "redis-cli", "-p", "6379", "-a", "${REDIS_PASSWORD}", "ping"]
    interval: ${HEALTHCHECK_INTERVAL}
    timeout: ${HEALTHCHECK_TIMEOUT}
    retries: ${HEALTHCHECK_RETRIES}

x-redis-sentinel: &redis-sentinel
  image: redis:${REDIS_VERSION}
  env_file:
    - .env
  environment:
    - REDIS_SHARD_COUNT=4
  entrypoint: ["/bin/sh", "/sentinel-entrypoint.sh"]
  volumes:
    - ./deploy/redis/sentinel-entrypoint.sh:/sentinel-entrypoint.sh:ro
  networks:
    - database
  deploy:
    resources:
      limits:
        memory: 256M
  healthcheck:
    test: ["CMD", "redis-cli", "-p", "26379", "ping"]
    interval: ${HEALTHCHECK_INTERVAL}
    timeout: ${HEALTHCHECK_TIMEOUT}
    retries: ${HEALTHCHECK_RETRIES}

services:
  # Ingestion plane: stateless gnet trackers, one process per port (8181-8184)
  # SO_REUSEPORT is configured in the binary; host mode avoids Docker NAT on the hot path.
  tracker-0:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/tracker"]
    network_mode: "${NET_MODE:-host}"
    env_file:
      - .env
    environment:
      - SERVER_PORT=8181
      - GOMEMLIMIT=700MiB   # hard memory limit; triggers GC before OOM killer fires
      - GOGC=50             # aggressive GC target: trade CPU for lower heap steady-state
    volumes:
      - ./deploy/geoip:/deploy/geoip:ro   # MaxMind DBs for geo filter and bid floor lookup
      - espx_logs:/var/log/espx:rw        # mmap audit log segments written by tracker
    ulimits:
      nofile:
        # gnet opens one fd per TCP connection; 100 000 allows ~100 k concurrent connections per instance
        soft: 100000
        hard: 100000
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "/tracker", "--health-probe", "http://127.0.0.1:8181/health"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis-0:
        condition: service_healthy
      redis-1:
        condition: service_healthy
      redis-2:
        condition: service_healthy
      redis-3:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"


  # Replica; same image and deps as tracker-0, different SERVER_PORT.
  tracker-1:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/tracker"]
    network_mode: "${NET_MODE:-host}"
    env_file:
      - .env
    environment:
      - SERVER_PORT=8182
      - GOMEMLIMIT=700MiB
      - GOGC=50
    volumes:
      - ./deploy/geoip:/deploy/geoip:ro
      - espx_logs:/var/log/espx:rw
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "/tracker", "--health-probe", "http://127.0.0.1:8182/health"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis-0:
        condition: service_healthy
      redis-1:
        condition: service_healthy
      redis-2:
        condition: service_healthy
      redis-3:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"


  # Replica; same image and deps as tracker-0, SERVER_PORT=8183.
  tracker-2:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/tracker"]
    network_mode: "${NET_MODE:-host}"
    env_file:
      - .env
    environment:
      - SERVER_PORT=8183
      - GOMEMLIMIT=700MiB
      - GOGC=50
    volumes:
      - ./deploy/geoip:/deploy/geoip:ro
      - espx_logs:/var/log/espx:rw
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "/tracker", "--health-probe", "http://127.0.0.1:8183/health"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis-0:
        condition: service_healthy
      redis-1:
        condition: service_healthy
      redis-2:
        condition: service_healthy
      redis-3:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"


  # Replica; same image and deps as tracker-0, SERVER_PORT=8184.
  tracker-3:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/tracker"]
    network_mode: "${NET_MODE:-host}"
    env_file:
      - .env
    environment:
      - SERVER_PORT=8184
      - GOMEMLIMIT=700MiB
      - GOGC=50
    volumes:
      - ./deploy/geoip:/deploy/geoip:ro
      - espx_logs:/var/log/espx:rw
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "/tracker", "--health-probe", "http://127.0.0.1:8184/health"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis-0:
        condition: service_healthy
      redis-1:
        condition: service_healthy
      redis-2:
        condition: service_healthy
      redis-3:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"


  # Edge LB: /track/* to trackers, /admin/* to management. Lua parses bodies for shard routing and blacklist cache.
  nginx:
    image: openresty/openresty:alpine
    network_mode: "${NET_MODE:-host}"
    environment:
      - REDIS_HOST=127.0.0.1
      - REDIS_PORT=6479
      - REDIS_PASS=${REDIS_PASSWORD}
      - REDIS_ADDRS=127.0.0.1:6479,127.0.0.1:6480,127.0.0.1:6481,127.0.0.1:6482
      - REDIS_SENTINEL_ADDRS=127.0.0.1:26379,127.0.0.1:26380,127.0.0.1:26381
      - REDIS_MASTER_NAMES=espx-shard-0,espx-shard-1,espx-shard-2,espx-shard-3
      - EDGE_BODY_MODE=full
      - EDGE_MAX_BODY_BYTES=8192
      - EDGE_BL_STALE_SEC=30
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./deploy/nginx/lua:/etc/nginx/lua:ro
    depends_on:
      tracker-0:
        condition: service_healthy
      tracker-1:
        condition: service_healthy
      tracker-2:
        condition: service_healthy
      tracker-3:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    deploy:
      resources:
        limits:
          memory: 1G
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"


  # XDP L4 filter + BPF blacklist sync (optional: docker compose --profile xdp up -d edge-xdp).
  edge-xdp:
    profiles: ["xdp"]
    build:
      context: .
      dockerfile: deploy/edge-xdp/Dockerfile
    privileged: true
    network_mode: "${NET_MODE:-host}"
    volumes:
      - /sys/fs/bpf:/sys/fs/bpf:rw
      - /lib/modules:/lib/modules:ro
    environment:
      - REDIS_ADDRS=127.0.0.1:6479,127.0.0.1:6480,127.0.0.1:6481,127.0.0.1:6482
      - REDIS_PASS=${REDIS_PASSWORD}
      - INGRESS_INTERFACE=${INGRESS_INTERFACE:-eth0}
      - XDP_MODE=${XDP_MODE:-generic}
      - BPF_PIN_DIR=/sys/fs/bpf/espx
      - BPF_BLOCKLIST_MAP=/sys/fs/bpf/espx/blocklist_v4
      - BPF_ALLOWLIST_MAP=/sys/fs/bpf/espx/allow_v4
      - SYNC_INTERVAL=5s
    depends_on:
      redis-0:
        condition: service_healthy
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"


  # Settlement: Redis stream consumer groups -> Postgres (ledger/stats) + ClickHouse (telemetry).
  processor:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/processor"]
    network_mode: "${NET_MODE:-host}"
    env_file:
      - .env
    volumes:
      - espx_logs:/var/log/espx:rw
    environment:
      - DB_DSN=${DB_DSN}
      - REDIS_ADDRS=127.0.0.1:6479,127.0.0.1:6480,127.0.0.1:6481,127.0.0.1:6482
      - CH_DSN=${CH_DSN}
      - PROCESSOR_PORT=${PROCESSOR_PORT:-8186}
      - DB_PROCESSOR_MAX_CONNS=${DB_PROCESSOR_MAX_CONNS}
      - ENV=${ENV:-development}
      - GOMEMLIMIT=1500MiB  # processor holds larger in-flight batches; needs wider heap
      - GOGC=100            # standard GC pace; processor is not latency-critical
      - BROKER_URL=127.0.0.1:9092
      - BROKER_REDIS_URL=redis://127.0.0.1:6490/0
      - BROKER_TOPIC=tracker-logs
      - BROKER_PARTITION_COUNT=6
      - BROKER_SHADOW_MODE=1
    healthcheck:
      test: ["CMD", "/processor", "--health-probe", "http://127.0.0.1:8186/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis-0:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      broker:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"


  # Broker coordination Redis (leader election + offsets). Separate from ad shards 6479-6482.
  broker-redis:
    image: redis:${REDIS_VERSION}
    env_file:
      - .env
    ports:
      - "6490:6379"
    command: ["redis-server", "--port", "6379", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - broker_redis_data:/data
    networks:
      - database
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}


  # mmap log broker: async ingest buffer between tracker audit log and processor settlement.
  broker:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint:
      - "/broker"
      - "-addr"
      - "127.0.0.1:9092"
      - "-health-addr"
      - "127.0.0.1:8081"
      - "-data-dir"
      - "/data"
      - "-node-id"
      - "broker-1"
      - "-redis-url"
      - "redis://127.0.0.1:6490/0"
    network_mode: "${NET_MODE:-host}"
    volumes:
      - broker_data:/data
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "/broker", "--health-probe", "http://127.0.0.1:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always
    depends_on:
      broker-redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"


  # Tails tracker mmap audit log and produces AdStreamEvent records to broker partitions.
  log-shipper:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint:
      - "/log-shipper"
      - "-broker"
      - "127.0.0.1:9092"
      - "-redis-url"
      - "redis://127.0.0.1:6490/0"
      - "-log-file"
      - "/var/log/espx/active.log"
      - "-topic"
      - "tracker-logs"
      - "-partitions"
      - "6"
    network_mode: "${NET_MODE:-host}"
    volumes:
      - espx_logs:/var/log/espx:ro
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always
    depends_on:
      broker:
        condition: service_healthy
      tracker-0:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"


  # Control plane: gRPC auth (Argon2id + PASETO). Single Redis shard is enough for session/lockout keys.
  auth:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/auth"]
    network_mode: "${NET_MODE:-host}"
    env_file:
      - .env
    environment:
      - AUTH_SERVER_PORT=51051
      - DB_DSN=${DB_DSN}
      - REDIS_ADDRS=127.0.0.1:6479
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis-0:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"


  # Control plane: REST admin API, outbox workers, pacing/schedule/recon background jobs.
  management:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/management"]
    network_mode: "${NET_MODE:-host}"
    env_file:
      - .env
    environment:
      - MANAGEMENT_PORT=8188
      - AUTH_SERVER_PORT=51051
      - AUTH_SERVER_HOST=127.0.0.1
      - SETTLEMENT_SERVER_PORT=51053
      - PAYMENT_SERVER_HOST=127.0.0.1
      - PAYMENT_SERVER_PORT=51052
      - PAYMENT_INTERNAL_TOKEN=${PAYMENT_INTERNAL_TOKEN}
      - DB_DSN=${DB_DSN}
      - REDIS_ADDRS=127.0.0.1:6479
    deploy:
      resources:
        limits:
          memory: 1G
    restart: always
    depends_on:
      auth:
        condition: service_started
      db:
        condition: service_healthy
      redis-0:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"


  # Payment: isolated process for gRPC intents, Stripe webhooks, and settlement outbox.
  # Host networking keeps webhook and settlement dial targets on 127.0.0.1 without bridge NAT.
  # depends_on management: settlement gRPC must be up before outbox worker can credit ledgers.
  payment:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/payment"]
    network_mode: "${NET_MODE:-host}"
    env_file:
      - .env
    environment:
      - PAYMENT_SERVER_PORT=51052
      - PAYMENT_WEBHOOK_PORT=8187
      - SETTLEMENT_SERVER_PORT=51053
      - PAYMENT_INTERNAL_TOKEN=${PAYMENT_INTERNAL_TOKEN}
      - SETTLEMENT_INTERNAL_TOKEN=${SETTLEMENT_INTERNAL_TOKEN}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - DB_DSN=${DB_DSN}
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always
    depends_on:
      management:
        condition: service_started
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # Billing: gRPC invoice generation and ledger drift checks for financial reporting.
  billing:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/billing"]
    network_mode: "${NET_MODE:-host}"
    env_file:
      - .env
    environment:
      - BILLING_SERVER_PORT=51054
      - BILLING_INTERNAL_TOKEN=${BILLING_INTERNAL_TOKEN}
      - DB_DSN=${DB_DSN}
    deploy:
      resources:
        limits:
          memory: 256M
    restart: always
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # IVT detector: ClickHouse anomaly scan -> management blacklist:fraud outbox enqueue.
  ivt-detector:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/ivt-detector"]
    network_mode: "${NET_MODE:-host}"
    env_file:
      - .env
    environment:
      - DB_DSN=${DB_DSN}
      - CH_DSN=${CH_DSN}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - MANAGEMENT_URL=${MANAGEMENT_URL:-http://127.0.0.1:8188}
      - IVT_DETECTOR_SCAN_INTERVAL_MS=${IVT_DETECTOR_SCAN_INTERVAL_MS:-300000}
      - IVT_DETECTOR_OUTBOX_PENDING_LIMIT=${IVT_DETECTOR_OUTBOX_PENDING_LIMIT:-500}
    deploy:
      resources:
        limits:
          memory: 256M
    restart: always
    depends_on:
      db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      management:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"


  # Relational source of truth: campaigns, ledger, outbox, audit. Tuned for many short tracker connections.
  db:
    image: postgres:${POSTGRES_VERSION}
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "${DB_PORT}:${DB_PORT}"
    command:
      # max_connections: sized for 4 tracker replicas x 4 conns + processor x 16 + management + auth headroom
      # shared_buffers: ~25% of container memory limit (2G)
      # work_mem: per-sort/hash allocation; 64MB per connection x 600 connections worst case = 38G virtual
      # maintenance_work_mem: index builds and vacuum
      # effective_cache_size: planner assumption for page cache; ~75% of container memory
      ["postgres", "-p", "${DB_PORT}", "-c", "max_connections=600", "-c", "shared_buffers=1GB", "-c", "work_mem=64MB", "-c", "maintenance_work_mem=256MB", "-c", "effective_cache_size=3GB"]
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p ${DB_PORT} -U ${DB_USER} -d ${DB_NAME}"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"


  # Redis shards (client-side StaticSlotSharder, ports 6479-6482)
  # AOF everysec + noeviction: budget/pacing keys must not be silently dropped under memory pressure.
  redis-0:
    image: redis:${REDIS_VERSION}
    env_file:
      - .env
    ports:
      - "6479:6379"
    command: ["redis-server", "--port", "6379", "--requirepass", "${REDIS_PASSWORD}",
              "--appendonly", "yes", "--appendfsync", "everysec",
              "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_0_data:/data
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - database
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}

  redis-1:
    image: redis:${REDIS_VERSION}
    env_file:
      - .env
    ports:
      - "6480:6379"
    command: ["redis-server", "--port", "6379", "--requirepass", "${REDIS_PASSWORD}",
              "--appendonly", "yes", "--appendfsync", "everysec",
              "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_1_data:/data
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - database
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}

  redis-2:
    image: redis:${REDIS_VERSION}
    env_file:
      - .env
    ports:
      - "6481:6379"
    command: ["redis-server", "--port", "6379", "--requirepass", "${REDIS_PASSWORD}",
              "--appendonly", "yes", "--appendfsync", "everysec",
              "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_2_data:/data
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - database
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}

  redis-3:
    image: redis:${REDIS_VERSION}
    env_file:
      - .env
    ports:
      - "6482:6379"
    command: ["redis-server", "--port", "6379", "--requirepass", "${REDIS_PASSWORD}",
              "--appendonly", "yes", "--appendfsync", "everysec",
              "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_3_data:/data
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - database
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}

  redis-0-replica:
    <<: *redis-replica
    command: ["redis-server", "--port", "6379", "--requirepass", "${REDIS_PASSWORD}",
              "--masterauth", "${REDIS_PASSWORD}", "--replicaof", "redis-0", "6379",
              "--appendonly", "yes", "--appendfsync", "everysec",
              "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_0_replica_data:/data
    depends_on:
      redis-0:
        condition: service_healthy

  redis-1-replica:
    <<: *redis-replica
    command: ["redis-server", "--port", "6379", "--requirepass", "${REDIS_PASSWORD}",
              "--masterauth", "${REDIS_PASSWORD}", "--replicaof", "redis-1", "6379",
              "--appendonly", "yes", "--appendfsync", "everysec",
              "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_1_replica_data:/data
    depends_on:
      redis-1:
        condition: service_healthy

  redis-2-replica:
    <<: *redis-replica
    command: ["redis-server", "--port", "6379", "--requirepass", "${REDIS_PASSWORD}",
              "--masterauth", "${REDIS_PASSWORD}", "--replicaof", "redis-2", "6379",
              "--appendonly", "yes", "--appendfsync", "everysec",
              "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_2_replica_data:/data
    depends_on:
      redis-2:
        condition: service_healthy

  redis-3-replica:
    <<: *redis-replica
    command: ["redis-server", "--port", "6379", "--requirepass", "${REDIS_PASSWORD}",
              "--masterauth", "${REDIS_PASSWORD}", "--replicaof", "redis-3", "6379",
              "--appendonly", "yes", "--appendfsync", "everysec",
              "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_3_replica_data:/data
    depends_on:
      redis-3:
        condition: service_healthy

  sentinel-0:
    <<: *redis-sentinel
    ports:
      - "26379:26379"
    depends_on:
      redis-0: {condition: service_healthy}
      redis-1: {condition: service_healthy}
      redis-2: {condition: service_healthy}
      redis-3: {condition: service_healthy}
      redis-0-replica: {condition: service_healthy}
      redis-1-replica: {condition: service_healthy}
      redis-2-replica: {condition: service_healthy}
      redis-3-replica: {condition: service_healthy}

  sentinel-1:
    <<: *redis-sentinel
    ports:
      - "26380:26379"
    depends_on:
      sentinel-0:
        condition: service_healthy

  sentinel-2:
    <<: *redis-sentinel
    ports:
      - "26381:26379"
    depends_on:
      sentinel-0:
        condition: service_healthy

  # Columnar event store. Processor batches inserts; insert_deduplicate handles at-least-once from streams.
  clickhouse:
    image: clickhouse/clickhouse-server:${CH_VERSION}
    env_file:
      - .env
    ports:
      - "${CH_PORT}:${CH_PORT}"
      - "${CH_HTTP_PORT}:8123"
    ulimits:
      nofile:
        soft: 262144  # ClickHouse requires high fd limits for part merges and replication connections
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./deploy/clickhouse/config.xml:/etc/clickhouse-server/config.d/memory_limit.xml:ro
      - ./deploy/clickhouse/users.xml:/etc/clickhouse-server/users.d/custom_users.xml:ro
      - ./deploy/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./deploy/clickhouse/recon_materialized_views.sql:/docker-entrypoint-initdb.d/recon_materialized_views.sql:ro
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - database
      - monitoring
    environment:
      - CLICKHOUSE_DB=${CH_NAME}
      - CLICKHOUSE_USER=${CH_USER}
      - CLICKHOUSE_PASSWORD=${CH_PASSWORD}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"


  # Observability (host network, scrapes tracker/mgmt/processor metrics on loopback)
  prometheus:
    image: prom/prometheus:latest
    network_mode: "${NET_MODE:-host}"
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--web.listen-address=:9190"]
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/monitoring/prometheus.rules.yml:/etc/prometheus/prometheus.rules.yml:ro
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  grafana:
    image: grafana/grafana:latest
    network_mode: "${NET_MODE:-host}"
    # Anonymous admin is dev-only; lock down before any non-local exposure.
    volumes:
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SERVER_HTTP_PORT=3100
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  alertmanager:
    image: prom/alertmanager:latest
    network_mode: "${NET_MODE:-host}"
    # Routes firing alerts to alertmanager-telegram on :8222.
    command: ["--config.file=/etc/alertmanager/alertmanager.yml", "--web.listen-address=:9093"]
    volumes:
      - ./deploy/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # Webhook proxy: Alertmanager JSON -> Telegram Bot API HTML messages.
  alertmanager-telegram:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/alertmanager-telegram"]
    network_mode: "${NET_MODE:-host}"
    environment:
      - PROXY_PORT=8222
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-YOUR_TELEGRAM_BOT_TOKEN_PLACEHOLDER}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-YOUR_TELEGRAM_CHAT_ID_PLACEHOLDER}
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # Off-path upload of rotated .log.zst.ready segments to S3. Profile "tools" only.
  log-evacuator:
    build:
      context: .
      dockerfile: Dockerfile.log-evacuator
    volumes:
      - espx_logs:/var/log/espx:rw
      - log_evacuator_state:/var/lib/espx:rw
    environment:
      - LOG_EVACUATOR_LOG_DIR=/var/log/espx
      - LOG_EVACUATOR_CHECKPOINT_PATH=/var/lib/espx/log-evacuator.checkpoint
      - LOG_EVACUATOR_S3_REGION=${LOG_EVACUATOR_S3_REGION:-${AWS_REGION}}
      - LOG_EVACUATOR_S3_BUCKET=${LOG_EVACUATOR_S3_BUCKET}
      - LOG_EVACUATOR_S3_PREFIX=${LOG_EVACUATOR_S3_PREFIX:-audit-logs}
      - LOG_EVACUATOR_S3_ENDPOINT=${LOG_EVACUATOR_S3_ENDPOINT:-}
      - LOG_EVACUATOR_S3_FORCE_PATH_STYLE=${LOG_EVACUATOR_S3_FORCE_PATH_STYLE:-false}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - LOG_EVACUATOR_SCAN_INTERVAL_MS=${LOG_EVACUATOR_SCAN_INTERVAL_MS:-5000}
      - LOG_EVACUATOR_MULTIPART_THRESHOLD_BYTES=${LOG_EVACUATOR_MULTIPART_THRESHOLD_BYTES:-8388608}
    profiles:
      - tools
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  frontend:   # reserved; not wired in this compose file
  backend:    # reserved; not wired in this compose file
  database:   # postgres, redis, clickhouse
  monitoring: # clickhouse metrics export

volumes:
  db_data:           # postgres data dir
  clickhouse_data:   # clickhouse parts and metadata
  redis_0_data:      # per-shard AOF/RDB; keys are not shared across shards
  redis_1_data:
  redis_2_data:
  redis_3_data:
  redis_0_replica_data:
  redis_1_replica_data:
  redis_2_replica_data:
  redis_3_replica_data:
  espx_logs:         # shared mmap audit logs from all trackers/processor
  log_evacuator_state: # checkpoint file for log-evacuator resume after crash
  broker_data:       # broker mmap segments per topic partition
  broker_redis_data: # broker HA coordination (leader election, offsets, topic registry)
