# eSPX local stack. Default NET_MODE=host binds services on loopback ports documented in docs/development.md.
# Ingestion (trackers + nginx) and observability use host networking; stateful stores sit on the database network.

services:
  # Ingestion plane: stateless gnet trackers, one process per port (8181-8184)
  # SO_REUSEPORT is configured in the binary; host mode avoids Docker NAT on the hot path.
  tracker-0:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/tracker"]
    network_mode: "${NET_MODE:-host}"
    env_file:
      - .env
    environment:
      - SERVER_PORT=8181
      - GOMEMLIMIT=700MiB   # hard memory limit; triggers GC before OOM killer fires
      - GOGC=50             # aggressive GC target: trade CPU for lower heap steady-state
    volumes:
      - ./deploy/geoip:/deploy/geoip:ro   # MaxMind DBs for geo filter and bid floor lookup
      - espx_logs:/var/log/espx:rw        # mmap audit log segments written by tracker
    ulimits:
      nofile:
        # gnet opens one fd per TCP connection; 100 000 allows ~100 k concurrent connections per instance
        soft: 100000
        hard: 100000
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "/tracker", "--health-probe", "http://127.0.0.1:8181/health"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis-0:
        condition: service_healthy
      redis-1:
        condition: service_healthy
      redis-2:
        condition: service_healthy
      redis-3:
        condition: service_healthy
      redis-4:
        condition: service_healthy
      redis-5:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"


  # Replica; same image and deps as tracker-0, different SERVER_PORT.
  tracker-1:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/tracker"]
    network_mode: "${NET_MODE:-host}"
    env_file:
      - .env
    environment:
      - SERVER_PORT=8182
      - GOMEMLIMIT=700MiB
      - GOGC=50
    volumes:
      - ./deploy/geoip:/deploy/geoip:ro
      - espx_logs:/var/log/espx:rw
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "/tracker", "--health-probe", "http://127.0.0.1:8182/health"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis-0:
        condition: service_healthy
      redis-1:
        condition: service_healthy
      redis-2:
        condition: service_healthy
      redis-3:
        condition: service_healthy
      redis-4:
        condition: service_healthy
      redis-5:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"


  # Replica; same image and deps as tracker-0, SERVER_PORT=8183.
  tracker-2:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/tracker"]
    network_mode: "${NET_MODE:-host}"
    env_file:
      - .env
    environment:
      - SERVER_PORT=8183
      - GOMEMLIMIT=700MiB
      - GOGC=50
    volumes:
      - ./deploy/geoip:/deploy/geoip:ro
      - espx_logs:/var/log/espx:rw
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "/tracker", "--health-probe", "http://127.0.0.1:8183/health"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis-0:
        condition: service_healthy
      redis-1:
        condition: service_healthy
      redis-2:
        condition: service_healthy
      redis-3:
        condition: service_healthy
      redis-4:
        condition: service_healthy
      redis-5:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"


  # Replica; same image and deps as tracker-0, SERVER_PORT=8184.
  tracker-3:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/tracker"]
    network_mode: "${NET_MODE:-host}"
    env_file:
      - .env
    environment:
      - SERVER_PORT=8184
      - GOMEMLIMIT=700MiB
      - GOGC=50
    volumes:
      - ./deploy/geoip:/deploy/geoip:ro
      - espx_logs:/var/log/espx:rw
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "/tracker", "--health-probe", "http://127.0.0.1:8184/health"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis-0:
        condition: service_healthy
      redis-1:
        condition: service_healthy
      redis-2:
        condition: service_healthy
      redis-3:
        condition: service_healthy
      redis-4:
        condition: service_healthy
      redis-5:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"


  # Edge LB: /track/* to trackers, /admin/* to management. Lua parses bodies for shard routing and blacklist cache.
  nginx:
    image: openresty/openresty:alpine
    network_mode: "${NET_MODE:-host}"
    environment:
      - REDIS_HOST=127.0.0.1
      - REDIS_PORT=6479
      - REDIS_PASS=${REDIS_PASSWORD}
      - REDIS_ADDRS=127.0.0.1:6479,127.0.0.1:6480,127.0.0.1:6481,127.0.0.1:6482,127.0.0.1:6483,127.0.0.1:6484
      - MANAGEMENT_URL=http://127.0.0.1:8188
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./deploy/nginx/lua:/etc/nginx/lua:ro
    depends_on:
      tracker-0:
        condition: service_healthy
      tracker-1:
        condition: service_healthy
      tracker-2:
        condition: service_healthy
      tracker-3:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    deploy:
      resources:
        limits:
          memory: 1G
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"


  # Settlement: Redis stream consumer groups -> Postgres (ledger/stats) + ClickHouse (telemetry).
  processor:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/processor"]
    network_mode: "${NET_MODE:-host}"
    env_file:
      - .env
    volumes:
      - espx_logs:/var/log/espx:rw
    environment:
      - DB_DSN=${DB_DSN}
      - REDIS_ADDRS=127.0.0.1:6479,127.0.0.1:6480,127.0.0.1:6481,127.0.0.1:6482,127.0.0.1:6483,127.0.0.1:6484
      - CH_DSN=${CH_DSN}
      - PROCESSOR_PORT=${PROCESSOR_PORT:-8186}
      - DB_PROCESSOR_MAX_CONNS=${DB_PROCESSOR_MAX_CONNS}
      - ENV=${ENV:-development}
      - GOMEMLIMIT=1500MiB  # processor holds larger in-flight batches; needs wider heap
      - GOGC=100            # standard GC pace; processor is not latency-critical
    healthcheck:
      test: ["CMD", "/processor", "--health-probe", "http://127.0.0.1:8186/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis-0:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"


  # Control plane: gRPC auth (Argon2id + PASETO). Single Redis shard is enough for session/lockout keys.
  auth:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/auth"]
    network_mode: "${NET_MODE:-host}"
    env_file:
      - .env
    environment:
      - AUTH_SERVER_PORT=51051
      - DB_DSN=${DB_DSN}
      - REDIS_ADDRS=127.0.0.1:6479
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis-0:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"


  # Control plane: REST admin API, outbox workers, pacing/schedule/recon background jobs.
  management:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/management"]
    network_mode: "${NET_MODE:-host}"
    env_file:
      - .env
    environment:
      - MANAGEMENT_PORT=8188
      - AUTH_SERVER_PORT=51051
      - AUTH_SERVER_HOST=127.0.0.1
      - BILLING_SERVER_HOST=127.0.0.1
      - BILLING_SERVER_PORT=51054
      - PAYMENT_SERVER_HOST=127.0.0.1
      - PAYMENT_SERVER_PORT=51052
      - DB_DSN=${DB_DSN}
      - REDIS_ADDRS=127.0.0.1:6479
    deploy:
      resources:
        limits:
          memory: 1G
    restart: always
    depends_on:
      auth:
        condition: service_started
      db:
        condition: service_healthy
      redis-0:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"


  # Control plane: payment intents, webhooks, settlement outbox (calls management settlement gRPC).
  payment:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/payment"]
    network_mode: "${NET_MODE:-host}"
    env_file:
      - .env
    environment:
      - PAYMENT_SERVER_PORT=51052
      - PAYMENT_WEBHOOK_PORT=8187
      - SETTLEMENT_SERVER_HOST=127.0.0.1
      - SETTLEMENT_SERVER_PORT=51053
      - DB_DSN=${DB_DSN}
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always
    depends_on:
      db:
        condition: service_healthy
      management:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"


  # Control plane: monthly invoice generation from balance_ledger aggregates.
  billing:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/billing"]
    network_mode: "${NET_MODE:-host}"
    env_file:
      - .env
    environment:
      - BILLING_SERVER_PORT=51054
      - DB_DSN=${DB_DSN}
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"


  # Control plane: async notification delivery (Telegram, Slack, SMTP, SMS).
  notifier:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/notifier"]
    network_mode: "${NET_MODE:-host}"
    env_file:
      - .env
    environment:
      - NOTIFIER_PORT=8085
      - DB_DSN=${DB_DSN}
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"


  # Relational source of truth: campaigns, ledger, outbox, audit. Tuned for many short tracker connections.
  db:
    image: postgres:${POSTGRES_VERSION}
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "${DB_PORT}:${DB_PORT}"
    command:
      # max_connections: sized for 4 tracker replicas x 4 conns + processor x 16 + management + auth headroom
      # shared_buffers: ~25% of container memory limit (2G)
      # work_mem: per-sort/hash allocation; 64MB per connection x 600 connections worst case = 38G virtual
      # maintenance_work_mem: index builds and vacuum
      # effective_cache_size: planner assumption for page cache; ~75% of container memory
      ["postgres", "-p", "${DB_PORT}", "-c", "max_connections=600", "-c", "shared_buffers=1GB", "-c", "work_mem=64MB", "-c", "maintenance_work_mem=256MB", "-c", "effective_cache_size=3GB"]
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p ${DB_PORT} -U ${DB_USER} -d ${DB_NAME}"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"


  # Redis shards (client-side StaticSlotSharder, ports 6479-6484)
  # AOF everysec + noeviction: budget/pacing keys must not be silently dropped under memory pressure.
  redis-0:
    image: redis:${REDIS_VERSION}
    env_file:
      - .env
    ports:
      - "6479:6379"
    command: ["redis-server", "--port", "6379", "--requirepass", "${REDIS_PASSWORD}",
              "--appendonly", "yes", "--appendfsync", "everysec",
              "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_0_data:/data
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - database
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}

  redis-1:
    image: redis:${REDIS_VERSION}
    env_file:
      - .env
    ports:
      - "6480:6379"
    command: ["redis-server", "--port", "6379", "--requirepass", "${REDIS_PASSWORD}",
              "--appendonly", "yes", "--appendfsync", "everysec",
              "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_1_data:/data
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - database
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}

  redis-2:
    image: redis:${REDIS_VERSION}
    env_file:
      - .env
    ports:
      - "6481:6379"
    command: ["redis-server", "--port", "6379", "--requirepass", "${REDIS_PASSWORD}",
              "--appendonly", "yes", "--appendfsync", "everysec",
              "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_2_data:/data
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - database
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}

  redis-3:
    image: redis:${REDIS_VERSION}
    env_file:
      - .env
    ports:
      - "6482:6379"
    command: ["redis-server", "--port", "6379", "--requirepass", "${REDIS_PASSWORD}",
              "--appendonly", "yes", "--appendfsync", "everysec",
              "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_3_data:/data
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - database
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}

  redis-4:
    image: redis:${REDIS_VERSION}
    env_file:
      - .env
    ports:
      - "6483:6379"
    command: ["redis-server", "--port", "6379", "--requirepass", "${REDIS_PASSWORD}",
              "--appendonly", "yes", "--appendfsync", "everysec",
              "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_4_data:/data
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - database
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}

  redis-5:
    image: redis:${REDIS_VERSION}
    env_file:
      - .env
    ports:
      - "6484:6379"
    command: ["redis-server", "--port", "6379", "--requirepass", "${REDIS_PASSWORD}",
              "--appendonly", "yes", "--appendfsync", "everysec",
              "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_5_data:/data
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - database
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}

  # Columnar event store. Processor batches inserts; insert_deduplicate handles at-least-once from streams.
  clickhouse:
    image: clickhouse/clickhouse-server:${CH_VERSION}
    env_file:
      - .env
    ports:
      - "${CH_PORT}:${CH_PORT}"
      - "${CH_HTTP_PORT}:8123"
    ulimits:
      nofile:
        soft: 262144  # ClickHouse requires high fd limits for part merges and replication connections
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./deploy/clickhouse/config.yaml:/etc/clickhouse-server/config.d/memory_limit.yaml:ro
      - ./deploy/clickhouse/users.yaml:/etc/clickhouse-server/users.d/custom_users.yaml:ro
      - ./deploy/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./deploy/clickhouse/recon_materialized_views.sql:/docker-entrypoint-initdb.d/02_recon_materialized_views.sql:ro
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - database
      - monitoring
    environment:
      - CLICKHOUSE_DB=${CH_NAME}
      - CLICKHOUSE_USER=${CH_USER}
      - CLICKHOUSE_PASSWORD=${CH_PASSWORD}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"


  # Observability (host network, scrapes tracker/mgmt/processor metrics on loopback)
  prometheus:
    image: prom/prometheus:latest
    network_mode: "${NET_MODE:-host}"
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--web.listen-address=:9190"]
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/monitoring/prometheus.rules.yml:/etc/prometheus/prometheus.rules.yml:ro
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  grafana:
    image: grafana/grafana:latest
    network_mode: "${NET_MODE:-host}"
    # Anonymous admin is dev-only; lock down before any non-local exposure.
    volumes:
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SERVER_HTTP_PORT=3100
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  alertmanager:
    image: prom/alertmanager:latest
    network_mode: "${NET_MODE:-host}"
    # Routes firing alerts to alertmanager-telegram on :8222.
    command: ["--config.file=/etc/alertmanager/alertmanager.yml", "--web.listen-address=:9093"]
    volumes:
      - ./deploy/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # Webhook proxy: Alertmanager JSON -> Telegram Bot API HTML messages.
  alertmanager-telegram:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/alertmanager-telegram"]
    network_mode: "${NET_MODE:-host}"
    environment:
      - PROXY_PORT=8222
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-YOUR_TELEGRAM_BOT_TOKEN_PLACEHOLDER}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-YOUR_TELEGRAM_CHAT_ID_PLACEHOLDER}
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # Off-path rsync of rotated .log.zst.ready segments to remote storage. Profile "tools" only.
  log-evacuator:
    build:
      context: .
      dockerfile: Dockerfile.log-evacuator
    volumes:
      - espx_logs:/var/log/espx:rw
      - ${STORAGE_BOX_SSH_KEY_PATH:-~/.ssh/id_rsa}:/root/.ssh/id_rsa:ro
    environment:
      - LOG_DIR=/var/log/espx
      - STORAGE_BOX_HOST=${STORAGE_BOX_HOST}
      - STORAGE_BOX_USER=${STORAGE_BOX_USER}
      - STORAGE_BOX_PATH=${STORAGE_BOX_PATH:-/}
      - RSYNC_BWLIMIT=${RSYNC_BWLIMIT:-5000}
    profiles:
      - tools
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  frontend:   # reserved; not wired in this compose file
  backend:    # reserved; not wired in this compose file
  database:   # postgres, redis, clickhouse
  monitoring: # clickhouse metrics export

volumes:
  db_data:           # postgres data dir
  clickhouse_data:   # clickhouse parts and metadata
  redis_0_data:      # per-shard AOF/RDB; keys are not shared across shards
  redis_1_data:
  redis_2_data:
  redis_3_data:
  redis_4_data:
  redis_5_data:
  espx_logs:         # shared mmap audit logs from all trackers/processor
