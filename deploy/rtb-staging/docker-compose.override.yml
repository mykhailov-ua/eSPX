# RTB staging soak overlay for docker compose.
#
# Usage (from repo root):
#   docker compose -f docker-compose.yml -f deploy/rtb-staging/docker-compose.override.yml up -d tracker-0
#
# Or merge .env.rtb-staging into .env before a full stack bring-up.
#
# Gates before production Phase 3 (see docs/rtb-cutover.md):
#   - ad_rtb_budget_reconcile_high == 0
#   - rate(ad_rtb_budget_spend_rejected_total[5m]) near zero
#   - Tracker p95/p99 within SLA

x-rtb-staging-env: &rtb-staging-env
  RTB_MODE: live
  RTB_BUDGET_AUTHORITY: rtb
  RTB_CLEARING_MODE: second
  RTB_TARGETING_INDEX: "true"
  RTB_SNAPSHOT_PATH: /var/lib/espx/rtb_snapshot.bin
  RTB_RECONCILE_INTERVAL_MS: "30000"
  RTB_BUDGET_DIVERGENCE_THRESHOLD_MICRO: "1000"
  RTB_RECONCILE_SAMPLE_SIZE: "32"

x-rtb-staging-volumes: &rtb-staging-volumes
  - rtb_snapshot:/var/lib/espx

services:
  tracker-0:
    environment:
      <<: *rtb-staging-env
    volumes:
      - ./deploy/geoip:/deploy/geoip:ro
      - espx_logs:/var/log/espx:rw
      - rtb_snapshot:/var/lib/espx

  tracker-1:
    environment:
      <<: *rtb-staging-env
    volumes:
      - ./deploy/geoip:/deploy/geoip:ro
      - espx_logs:/var/log/espx:rw
      - rtb_snapshot:/var/lib/espx

  tracker-2:
    environment:
      <<: *rtb-staging-env
    volumes:
      - ./deploy/geoip:/deploy/geoip:ro
      - espx_logs:/var/log/espx:rw
      - rtb_snapshot:/var/lib/espx

  tracker-3:
    environment:
      <<: *rtb-staging-env
    volumes:
      - ./deploy/geoip:/deploy/geoip:ro
      - espx_logs:/var/log/espx:rw
      - rtb_snapshot:/var/lib/espx

volumes:
  rtb_snapshot:
