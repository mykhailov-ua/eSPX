# Minimal Redis Sentinel lab for broker coordination failover chaos tests.
# Usage:
#   docker compose -f deploy/broker-lab/docker-compose.sentinel.yml up -d
#   export BROKER_CHAOS_SENTINEL=1
#   export BROKER_REDIS_SENTINEL_MASTER=broker-coord
#   export BROKER_REDIS_SENTINEL_ADDRS=127.0.0.1:26390
#   export BROKER_REDIS_URL=redis://127.0.0.1:6380/0
#   export BROKER_CHAOS_SENTINEL_STOP_CONTAINER=broker-lab-redis-master-1
#   BROKER_CHAOS_LAB=1 go test -run TestChaos_RedisSentinelFailover ./pkg/broker/server/...

services:
  redis-master:
    image: redis:7-alpine
    container_name: broker-lab-redis-master-1
    network_mode: host
    command: ["redis-server", "--port", "6380", "--appendonly", "yes"]

  redis-replica:
    image: redis:7-alpine
    network_mode: host
    command: ["redis-server", "--port", "6381", "--replicaof", "127.0.0.1", "6380"]
    depends_on:
      - redis-master

  redis-sentinel:
    image: redis:7-alpine
    network_mode: host
    depends_on:
      - redis-master
      - redis-replica
    command:
      - sh
      - -c
      - |
        cat > /tmp/sentinel.conf <<'EOF'
        port 26390
        sentinel monitor broker-coord 127.0.0.1 6380 1
        sentinel down-after-milliseconds broker-coord 3000
        sentinel failover-timeout broker-coord 10000
        sentinel parallel-syncs broker-coord 1
        EOF
        exec redis-sentinel /tmp/sentinel.conf
