# haproxy.cfg: TCP proxy for ESPX broker HA lab.
# :9092 — produce path (leader-only via /leaderz health check).
# :9093 — any healthy broker (fetch / replication); or dial broker TCP ports directly.

global
    log stdout format raw local0

defaults
    log     global
    mode    tcp
    timeout connect 5s
    timeout client  50s
    timeout server  50s

# HTTP stats UI for quick backend up/down visibility during broker failover drills.
frontend stats
    mode http
    bind 0.0.0.0:1936
    stats enable
    stats uri /
    stats refresh 2s

# Produce-facing listener: only nodes that are ready leader for tracker-logs stay in rotation.
# Clients without Redis leader discovery should target this port (not the follower).
frontend espx_broker_produce
    bind 0.0.0.0:9092
    default_backend espx_broker_leaders

backend espx_broker_leaders
    mode tcp
    option httpchk
    http-check send meth GET uri /leaderz?topic=tracker-logs ver HTTP/1.1 hdr Host localhost
    http-check expect status 200
    default-server inter 2s fall 2 rise 2
    server broker-1 127.0.0.1:9093 check port 8081
    server broker-2 127.0.0.1:9094 check port 8082

# General broker TCP: any node passing disk health (followers serve fetch/replication).
frontend espx_broker_any
    bind 0.0.0.0:9093
    default_backend espx_broker_healthy

backend espx_broker_healthy
    mode tcp
    option httpchk GET /healthz
    http-check expect status 200
    default-server inter 2s fall 2 rise 2
    server broker-1 127.0.0.1:9093 check port 8081
    server broker-2 127.0.0.1:9094 check port 8082
