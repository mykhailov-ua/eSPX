# Prometheus scrape config for 2-tracker constrained load tests.
global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - "prometheus.rules.yaml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - '127.0.0.1:9093'

scrape_configs:
  - job_name: 'tracker'
    static_configs:
      - targets: ['127.0.0.1:9101', '127.0.0.1:9102']
  - job_name: 'processor'
    static_configs:
      - targets: ['127.0.0.1:8186']
  - job_name: 'nginx-edge'
    static_configs:
      - targets: ['127.0.0.1:8180']
    metrics_path: '/metrics/edge'
