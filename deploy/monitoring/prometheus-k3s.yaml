# Prometheus scrape config for cold-path pods in k3s (NodePort on host NIC).
# Generate from template: scripts/k8s/render_prometheus_k3s.sh
# Run host prometheus: prom/prometheus with this file mounted as prometheus.yaml

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "prometheus.rules.yaml"

scrape_configs:
  - job_name: espx-k3s-management
    static_configs:
      - targets: ['__NODE_IP__:30188']
    metrics_path: /metrics

  - job_name: espx-k3s-processor
    static_configs:
      - targets: ['__NODE_IP__:30186']
    metrics_path: /metrics
