# Billing gRPC: invoice generation from balance_ledger aggregates.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing
  namespace: espx
  labels:
    app.kubernetes.io/name: billing
    app.kubernetes.io/component: cold-path
    app.kubernetes.io/part-of: espx
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: billing
  template:
    metadata:
      labels:
        app.kubernetes.io/name: billing
        app.kubernetes.io/component: cold-path
        app.kubernetes.io/part-of: espx
    spec:
      containers:
        - name: billing
          image: ad-event-processor:latest
          imagePullPolicy: IfNotPresent
          command: ["/billing"]
          envFrom:
            - configMapRef:
                name: espx-env
            - secretRef:
                name: espx-secrets
          env:
            - name: GOMEMLIMIT
              value: "400MiB"
            - name: SERVER_PORT
              value: "51054"
          ports:
            - name: grpc
              containerPort: 51054
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 512Mi
