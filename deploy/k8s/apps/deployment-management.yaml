# Management HTTP admin API, settlement gRPC, and background workers (outbox, pacing, recon).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: management
  namespace: espx
  labels:
    app.kubernetes.io/name: management
    app.kubernetes.io/component: cold-path
    app.kubernetes.io/part-of: espx
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: management
  template:
    metadata:
      labels:
        app.kubernetes.io/name: management
        app.kubernetes.io/component: cold-path
        app.kubernetes.io/part-of: espx
    spec:
      containers:
        - name: management
          image: ad-event-processor:latest
          imagePullPolicy: IfNotPresent
          command: ["/management"]
          envFrom:
            - configMapRef:
                name: espx-env
            - secretRef:
                name: espx-secrets
          env:
            - name: GOMEMLIMIT
              value: "600MiB"
            - name: SERVER_PORT
              value: "8188"
          ports:
            - name: http
              containerPort: 8188
            - name: settlement-grpc
              containerPort: 51053
            - name: udp-control
              containerPort: 8190
              protocol: UDP
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 768Mi
