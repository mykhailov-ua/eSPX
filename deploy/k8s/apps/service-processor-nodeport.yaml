# NodePort exposes processor /health and /metrics for host-network Prometheus scrape.
apiVersion: v1
kind: Service
metadata:
  name: processor-nodeport
  namespace: espx
  labels:
    app.kubernetes.io/name: processor
    app.kubernetes.io/part-of: espx
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: processor
  ports:
    - name: http
      port: 8186
      targetPort: http
      nodePort: 30186
