# Auth gRPC: sessions, API keys, lockout. Uses Redis shard 0 only (not campaign shards).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: espx
  labels:
    app.kubernetes.io/name: auth
    app.kubernetes.io/component: cold-path
    app.kubernetes.io/part-of: espx
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: auth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth
        app.kubernetes.io/component: cold-path
        app.kubernetes.io/part-of: espx
    spec:
      containers:
        - name: auth
          image: ad-event-processor:latest
          imagePullPolicy: IfNotPresent
          command: ["/auth"]
          envFrom:
            - configMapRef:
                name: espx-env
            - secretRef:
                name: espx-secrets
          env:
            - name: GOMEMLIMIT
              value: "400MiB"
            # config.Load requires SERVER_PORT even though auth listens on AUTH_SERVER_PORT.
            - name: SERVER_PORT
              value: "51051"
          ports:
            - name: grpc
              containerPort: 51051
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 512Mi
