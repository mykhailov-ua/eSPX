# NodePort exposes payment Stripe webhook HTTP on the host for local checkout tests.
apiVersion: v1
kind: Service
metadata:
  name: payment-webhook-nodeport
  namespace: espx
  labels:
    app.kubernetes.io/name: payment
    app.kubernetes.io/part-of: espx
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: payment
  ports:
    - name: webhook
      port: 8187
      targetPort: webhook
      nodePort: 30187
