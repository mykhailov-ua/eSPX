# Payment gRPC plus Stripe webhook HTTP. Settlement credit flows to management gRPC.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: espx
  labels:
    app.kubernetes.io/name: payment
    app.kubernetes.io/component: cold-path
    app.kubernetes.io/part-of: espx
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: payment
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payment
        app.kubernetes.io/component: cold-path
        app.kubernetes.io/part-of: espx
    spec:
      containers:
        - name: payment
          image: ad-event-processor:latest
          imagePullPolicy: IfNotPresent
          command: ["/payment"]
          envFrom:
            - configMapRef:
                name: espx-env
            - secretRef:
                name: espx-secrets
          env:
            - name: GOMEMLIMIT
              value: "400MiB"
            - name: SERVER_PORT
              value: "51052"
          ports:
            - name: grpc
              containerPort: 51052
            - name: webhook
              containerPort: 8187
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 512Mi
