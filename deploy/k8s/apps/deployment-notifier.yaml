# Async notification worker (Telegram, Slack, SMTP). Separate schema; not on /track path.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifier
  namespace: espx
  labels:
    app.kubernetes.io/name: notifier
    app.kubernetes.io/component: cold-path
    app.kubernetes.io/part-of: espx
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: notifier
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notifier
        app.kubernetes.io/component: cold-path
        app.kubernetes.io/part-of: espx
    spec:
      containers:
        - name: notifier
          image: ad-event-processor:latest
          imagePullPolicy: IfNotPresent
          command: ["/notifier"]
          envFrom:
            - configMapRef:
                name: espx-env
            - secretRef:
                name: espx-secrets
          env:
            - name: GOMEMLIMIT
              value: "400MiB"
            - name: SERVER_PORT
              value: "8085"
          ports:
            - name: grpc
              containerPort: 8085
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 512Mi
