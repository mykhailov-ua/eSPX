# OpenResty edge on :8180. hostNetwork; nginx conf/lua from ConfigMaps.
# Do not run alongside compose nginx — both bind host port 8180.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nginx-edge
  namespace: espx-edge
  labels:
    app.kubernetes.io/name: nginx-edge
    app.kubernetes.io/component: hot-path
    app.kubernetes.io/part-of: espx
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nginx-edge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx-edge
        app.kubernetes.io/component: hot-path
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: openresty
          image: openresty/openresty:alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: REDIS_HOST
              value: "127.0.0.1"
            - name: REDIS_PORT
              value: "6479"
            - name: REDIS_PASS
              valueFrom:
                secretKeyRef:
                  name: espx-edge-secrets
                  key: REDIS_PASSWORD
            - name: REDIS_ADDRS
              value: "127.0.0.1:6479,127.0.0.1:6480,127.0.0.1:6481,127.0.0.1:6482"
            - name: MANAGEMENT_URL
              value: "http://127.0.0.1:30188"
          volumeMounts:
            - name: nginx-conf
              mountPath: /usr/local/openresty/nginx/conf/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: nginx-conf-etc
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: nginx-lua
              mountPath: /etc/nginx/lua
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 8180
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              memory: 1Gi
      volumes:
        - name: nginx-conf
          configMap:
            name: nginx-edge-conf
        - name: nginx-conf-etc
          configMap:
            name: nginx-edge-conf
        - name: nginx-lua
          configMap:
            name: nginx-edge-lua
