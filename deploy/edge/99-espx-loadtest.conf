# eSPX local load-test host tuning (extends 99-espx-edge.conf).
# Install: sudo bash scripts/load-test/host_tune.sh apply
#
# Targets: k6 outbound connection churn, TIME_WAIT pressure, accept queues on loopback.

# Ephemeral port pool for k6 / many short-lived HTTP clients (default ~28k ports is tight).
net.ipv4.ip_local_port_range = 1024 65535

# TIME_WAIT socket hash limit — Run A hit 52,862 TW vs default max_tw_buckets 65,536.
net.ipv4.tcp_max_tw_buckets = 262144

# Faster recycle of FIN-WAIT-2 / reduce TIME_WAIT hold (lab only; default 60).
net.ipv4.tcp_fin_timeout = 15

# Loopback + ingress burst accept queues (align with edge conf).
net.core.somaxconn = 16384
net.ipv4.tcp_max_syn_backlog = 16384

# Drop queue when softirq cannot drain NIC (less critical on loopback, free on bare metal).
net.core.netdev_max_backlog = 16384

# TCP buffer ceilings for burst POST bodies (match edge conf).
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# Reuse TIME_WAIT for new outbound connections (1=enable on older kernels, 2=enable on 4.12+).
net.ipv4.tcp_tw_reuse = 1

# SYN cookies under SYN flood / burst connect.
net.ipv4.tcp_syncookies = 1

# Global open-file ceiling (must be <= fs.nr_open).
fs.file-max = 2097152

# inotify / perf (optional profiling).
fs.inotify.max_user_instances = 1024
fs.inotify.max_user_watches = 524288
