# eSPX ingress network stack tuning.
# Install: sudo bash scripts/edge/edge_sysctl.sh apply

# Maximum sockets in the listen(2) accept queue.
net.core.somaxconn = 16384

# SYN backlog for half-open connections.
net.ipv4.tcp_max_syn_backlog = 16384

# SYN cookies under SYN flood.
net.ipv4.tcp_syncookies = 1

# High-RPS TCP buffer ceilings (bytes).
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# Reuse TIME_WAIT sockets for new outbound connections (Linux 4.12+).
net.ipv4.tcp_tw_reuse = 1
