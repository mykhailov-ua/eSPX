worker_processes auto;
events {
    worker_connections 10240;
}

http {
    # Shared dictionary for the edge circuit breaker
    lua_shared_dict circuit_breaker 10m;

    # Import Lua modules
    lua_package_path "/usr/local/openresty/lualib/?.lua;;/etc/nginx/lua/?.lua;";

    server {
        listen 80;

        location /track {
            # Run the access check script
            access_by_lua_file /etc/nginx/lua/access_check.lua;

            # Include the file-based blacklists generated by NginxConfigWorker
            include /etc/nginx/blacklists/manual.conf;
            include /etc/nginx/blacklists/auto.conf;

            proxy_pass http://ad_processor:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
