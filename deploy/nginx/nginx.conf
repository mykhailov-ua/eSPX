worker_processes auto;
worker_rlimit_nofile 100000;

events {
    worker_connections 20480;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log off;
    error_log /var/log/nginx/error.log crit;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    
    keepalive_timeout  65;
    keepalive_requests 10000;

    # Compression disabled to minimize CPU load during tests
    gzip off;

    upstream tracker_backend {
        server 127.0.0.1:8081;
        server 127.0.0.1:8082;
        server 127.0.0.1:8083;
        server 127.0.0.1:8084;
        keepalive 2048;
    }

    server {
        listen 80 reuseport; # reuseport distributes incoming connections across workers at the kernel level
        server_name localhost;

        location / {
            proxy_pass http://tracker_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            proxy_buffering off;
            proxy_request_buffering off;
            
            # Timeouts to prevent resource hanging
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }

        location /health {
            proxy_pass http://tracker_backend/health;
            access_log off;
        }
    }
}
