# nginx.conf: OpenResty edge in front of tracker replicas.
# Terminates /track, runs Lua blacklist and circuit-breaker checks, then proxies to gnet upstream.

env REDIS_HOST;
env REDIS_PORT;
env REDIS_PASS;
env REDIS_ADDRS;
env REDIS_SENTINEL_ADDRS;
env REDIS_MASTER_NAMES;
env EDGE_BODY_MODE;
env EDGE_MAX_BODY_BYTES;
env EDGE_BL_STALE_SEC;

worker_processes auto;
worker_rlimit_nofile 100000;

events {
    # Sized for 1G container: 16k/worker x auto workers stays under fd and buffer budget.
    worker_connections 16384;
    multi_accept on;
}

http {
    # Shared dict tracks Redis error rate for edge circuit breaker open/close decisions.
    lua_shared_dict circuit_breaker 10m;

    # Timer-synced IP blocklist (b:<ip> keys); sized for hundreds of thousands of entries.
    lua_shared_dict blacklist_cache 32m;

    # Cached rate_limit_per_min / rate_limit_window_ms from Redis config:values (worker 0 sync).
    lua_shared_dict edge_config 1m;

    # Per-campaign fixed-window counters; sized for hot campaigns across rolling buckets.
    lua_shared_dict edge_rl 32m;

    # Cached Sentinel master host:port per shard (short TTL; refreshed on connect failure).
    lua_shared_dict sentinel_cache 2m;

    # Upstream active health probe state (resty.upstream.healthcheck).
    lua_shared_dict healthcheck 1m;

    # Edge block counters exported at /metrics/edge (Phase 3).
    lua_shared_dict edge_metrics 1m;
    # Fixed Slot Map cache (1024 slots + version metadata).
    lua_shared_dict slot_map 4m;

    # Import Lua modules from OpenResty and the mounted deploy/nginx/lua tree.
    lua_package_path "/usr/local/openresty/lualib/?.lua;;/etc/nginx/lua/?.lua;";

    init_worker_by_lua_file /etc/nginx/lua/init-worker.lua;

    # OOM defence: bound concurrent clients. Worst-case RAM ~ global_limit x client_max_body_size.
    limit_conn_zone $binary_remote_addr zone=track_perip:16m;
    limit_conn_zone $server_name zone=track_global:4m;
    limit_conn_status 503;

    # Per-IP request rate backstop before Lua (Phase 1).
    limit_req_zone $binary_remote_addr zone=track_req_perip:32m rate=100r/s;
    limit_req_status 429;

    # Match tracker MAX_REQUEST_BODY_SIZE default (1 MiB).
    client_max_body_size 1m;
    client_body_buffer_size 64k;
    client_body_timeout 5s;
    client_header_timeout 5s;
    send_timeout 10s;
    reset_timedout_connection on;

    # Round-robin pool of local tracker processes; keepalive avoids per-request TCP setup.
    upstream trackers {
        server 127.0.0.1:8181 max_fails=3 fail_timeout=10s max_conns=2048;
        server 127.0.0.1:8182 max_fails=3 fail_timeout=10s max_conns=2048;
        server 127.0.0.1:8183 max_fails=3 fail_timeout=10s max_conns=2048;
        server 127.0.0.1:8184 max_fails=3 fail_timeout=10s max_conns=2048;
        keepalive 256;
    }

    server {
        listen 8180 backlog=8192;

        location /metrics/edge {
            content_by_lua_block {
                require("edge-metrics").render_prometheus()
            }
        }

        location /track {
            # Edge accepts only small /track bodies; full 1 MiB limit remains on tracker ports.
            client_max_body_size 8k;
            limit_req zone=track_req_perip burst=50 nodelay;
            limit_conn track_perip 200;
            limit_conn track_global 8192;

            # Reject blacklisted clients and trip edge breaker before the request hits Go.
            access_by_lua_file /etc/nginx/lua/access-check.lua;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_pass http://trackers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-TLS-Hash $http_x_tls_hash;
            proxy_set_header X-Campaign-Id $http_x_campaign_id;
            proxy_set_header X-Fraud-Score $http_x_fraud_score;
            proxy_set_header X-Client-ASN $http_x_client_asn;

            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_connect_timeout 1s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;

            # Stream body to upstream; avoid buffering full payload in nginx worker heap.
            proxy_request_buffering off;
            proxy_buffering off;
        }
    }
}
