# nginx.conf: OpenResty edge in front of tracker replicas.
# Terminates /track, runs Lua blacklist and circuit-breaker checks, then proxies to gnet upstream.

env REDIS_HOST;
env REDIS_PORT;
env REDIS_PASS;
env REDIS_ADDRS;

worker_processes auto;
worker_rlimit_nofile 100000;

events {
    worker_connections 65535;
}

http {
    # Shared dict tracks Redis error rate for edge circuit breaker open/close decisions.
    lua_shared_dict circuit_breaker 10m;

    # Shared dict caches per-IP blacklist probe results to cut Redis round trips.
    lua_shared_dict blacklist_cache 10m;

    # Import Lua modules from OpenResty and the mounted deploy/nginx/lua tree.
    lua_package_path "/usr/local/openresty/lualib/?.lua;;/etc/nginx/lua/?.lua;";

    # Round-robin pool of local tracker processes; keepalive avoids per-request TCP setup.
    upstream trackers {
        server 127.0.0.1:8181;
        server 127.0.0.1:8182;
        server 127.0.0.1:8183;
        server 127.0.0.1:8184;
        keepalive 1024;
    }

    server {
        listen 8180;

        location /track {
            # Reject blacklisted clients and trip edge breaker before the request hits Go.
            access_by_lua_file /etc/nginx/lua/access_check.lua;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_pass http://trackers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_connect_timeout 1s;
        }
    }
}
