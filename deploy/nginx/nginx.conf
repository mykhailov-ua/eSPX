# nginx.conf: OpenResty edge in front of tracker replicas and management admin API.
# Lua: deploy/nginx/lua/ (access-check.lua two-phase gate, edge-metrics, blacklist sync).
# M5-A: TLS :443 terminates H2/H3; upstream to trackers stays HTTP/1.1.

env REDIS_HOST;
env REDIS_PORT;
env REDIS_PASS;
env REDIS_ADDRS;
env REDIS_SENTINEL_ADDRS;
env REDIS_MASTER_NAMES;
env MANAGEMENT_URL;
env EDGE_BL_STALE_SEC;
env EDGE_TARPIT_ENABLED;
env EDGE_TARPIT_MAX_HEADERS;
env EDGE_TARPIT_BODY_BYTES;
env EDGE_TARPIT_MAX_SEC;
env SLOT_MAP_SYNC_INTERVAL_SEC;

worker_processes auto;
worker_rlimit_nofile 100000;

events {
    worker_connections 65535;
}

http {
    lua_shared_dict circuit_breaker 10m;
    lua_shared_dict blacklist_cache 10m;
    lua_shared_dict edge_metrics 10m;
    lua_shared_dict edge_config 1m;
    lua_shared_dict sentinel_cache 5m;
    lua_shared_dict slot_map 2m;
    lua_shared_dict edge_rl 50m;
    lua_shared_dict healthcheck 1m;

    lua_package_path "/usr/local/openresty/lualib/?.lua;;/etc/nginx/lua/?.lua;";

    init_worker_by_lua_file /etc/nginx/lua/init-worker.lua;

    limit_req_zone $binary_remote_addr zone=track_ip:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=admin_login_ip:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=admin_auth_ip:10m rate=60r/m;

    upstream trackers {
        server 127.0.0.1:8181;
        server 127.0.0.1:8182;
        server 127.0.0.1:8183;
        server 127.0.0.1:8184;
        keepalive 1024;
    }

    upstream management {
        server 127.0.0.1:8188;
        keepalive 64;
    }

    # Shared /track proxy directives (plain :8180 and TLS :443).
    # M5-A3: upstream always HTTP/1.1; edge records ingress protocol via edge-ingress.lua.

    server {
        listen 8180;

        location /metrics/edge {
            content_by_lua_block {
                local edge_metrics = require "edge-metrics"
                edge_metrics.render_prometheus()
            }
        }

        location /admin/ {
            limit_req zone=admin_auth_ip burst=20 nodelay;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_pass http://management;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 2s;
            proxy_read_timeout 30s;
        }

        location = /api/v1/auth/login {
            limit_req zone=admin_login_ip burst=5 nodelay;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_pass http://management;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 2s;
            proxy_read_timeout 30s;
        }

        location /api/v1/auth/ {
            limit_req zone=admin_auth_ip burst=20 nodelay;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_pass http://management;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 2s;
            proxy_read_timeout 30s;
        }

        location /track {
            limit_req zone=track_ip burst=50 nodelay;

            access_by_lua_file /etc/nginx/lua/access-check.lua;

            balancer_by_lua_file /etc/nginx/lua/edge-shard-balancer.lua;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_pass http://trackers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_connect_timeout 1s;
            proxy_read_timeout 5s;
        }
    }

    # M5-A1/A2: TLS ingress with ALPN h3, h2, http/1.1. Requires deploy/nginx/certs/ (see generate-dev-certs.sh).
    server {
        listen 443 ssl http2;
        listen 443 quic reuseport;
        http3 on;
        http3_hq on;

        ssl_certificate     /etc/nginx/certs/edge-dev.crt;
        ssl_certificate_key /etc/nginx/certs/edge-dev.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        add_header Alt-Svc 'h3=":443"; ma=86400' always;

        ssl_client_hello_by_lua_file /etc/nginx/lua/edge-tls-hash.lua;

        location /metrics/edge {
            content_by_lua_block {
                local edge_metrics = require "edge-metrics"
                edge_metrics.render_prometheus()
            }
        }

        location /track {
            limit_req zone=track_ip burst=50 nodelay;

            access_by_lua_file /etc/nginx/lua/access-check.lua;

            balancer_by_lua_file /etc/nginx/lua/edge-shard-balancer.lua;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_pass http://trackers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_connect_timeout 1s;
            proxy_read_timeout 5s;
        }
    }
}
