# docker-compose.yml: local HA broker lab with Redis leader election and HAProxy TCP fanout.
# Host networking keeps broker ports aligned with production-style single-host deploys.
# Build broker before up: go build -o deploy/broker-ha/bin/espx-broker ./cmd/broker
# Override binary path: ESPX_BROKER_BIN=/path/to/espx-broker docker compose up

version: '3.8'

services:
  # Coordination store for broker leader election and segment metadata.
  redis:
    image: redis:7-alpine
    network_mode: host

  # TCP load balancer on :9092 with HTTP health checks against broker health ports.
  haproxy:
    image: haproxy:2.8-alpine
    network_mode: host
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - broker-1
      - broker-2

  # Primary broker node; data dir persisted for segment recovery after restart.
  broker-1:
    image: alpine:latest
    network_mode: host
    command: ["/app/espx-broker", "-addr", "127.0.0.1:9093", "-health-addr", "127.0.0.1:8081", "-data-dir", "/data", "-node-id", "broker-1", "-redis-url", "redis://127.0.0.1:6379/0", "-leader-lease-ttl", "15s", "-coord-interval", "3s"]
    volumes:
      - ${ESPX_BROKER_BIN:-./bin/espx-broker}:/app/espx-broker:ro
      - broker-1-data:/data
    depends_on:
      - redis

  # Secondary broker node for failover and HAProxy backend redundancy.
  broker-2:
    image: alpine:latest
    network_mode: host
    command: ["/app/espx-broker", "-addr", "127.0.0.1:9094", "-health-addr", "127.0.0.1:8082", "-data-dir", "/data", "-node-id", "broker-2", "-redis-url", "redis://127.0.0.1:6379/0", "-leader-lease-ttl", "15s", "-coord-interval", "3s"]
    volumes:
      - ${ESPX_BROKER_BIN:-./bin/espx-broker}:/app/espx-broker:ro
      - broker-2-data:/data
    depends_on:
      - redis

volumes:
  broker-1-data:
  broker-2-data:
