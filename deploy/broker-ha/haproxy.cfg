# haproxy.cfg: TCP proxy for ESPX broker HA lab.
# Frontends client traffic on :9092; backends use HTTP /healthz on separate health ports.

global
    log stdout format raw local0

defaults
    log     global
    mode    tcp
    timeout connect 5s
    timeout client  50s
    timeout server  50s

# HTTP stats UI for quick backend up/down visibility during broker failover drills.
frontend stats
    mode http
    bind 0.0.0.0:1936
    stats enable
    stats uri /
    stats refresh 2s

# Client-facing broker listener; all produce/consume clients target this port.
frontend espx_broker_front
    bind 0.0.0.0:9092
    default_backend espx_broker_back

# Active health checks remove unhealthy broker nodes from rotation within seconds.
backend espx_broker_back
    mode tcp
    option httpchk GET /healthz
    http-check expect status 200
    default-server inter 2s fall 2 rise 2
    server broker-1 127.0.0.1:9093 check port 8081
    server broker-2 127.0.0.1:9094 check port 8082
