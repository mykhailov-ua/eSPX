# Production overlay: hourly payment financial recon + ops alerting.
#
#   docker compose -f docker-compose.yml -f deploy/docker-compose.prod.yml up -d
#
# Requires OPS_ALERTS recipient in .env (TELEGRAM_CHAT_ID or NOTIFIER_SLACK_WEBHOOK_URL).
# Prometheus alerts: PaymentFinancialReconMissingLedgerTopup, PaymentFinancialReconDeadOutbox
# (deploy/monitoring/prometheus.rules.yml). See docs/reports/PAYMENT_FINANCIAL_RECON.md.

services:
  payment:
    environment:
      - OPS_ALERTS_ENABLED=${OPS_ALERTS_ENABLED:-true}
      - NOTIFIER_SERVER_HOST=127.0.0.1
      - NOTIFIER_PORT=8085
      - DB_DSN=${DB_DSN}
      - PAYMENT_FINANCIAL_RECON_INTERVAL_MS=3600000

  management:
    environment:
      - OPS_ALERTS_ENABLED=${OPS_ALERTS_ENABLED:-true}
      - NOTIFIER_SERVER_HOST=127.0.0.1
      - NOTIFIER_PORT=8085
