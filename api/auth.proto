syntax = "proto3";

package auth;

option go_package = "espx/internal/auth/pb;pb";

import "google/protobuf/timestamp.proto";

service AuthService {
  // Separate gRPC service so credential hashing and session state do not share the management HTTP pool.
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  // Management middleware calls this on every admin request instead of parsing tokens locally.
  rpc VerifyToken(VerifyTokenRequest) returns (VerifyTokenResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc RevokeToken(RevokeTokenRequest) returns (RevokeTokenResponse);

  // Raw secret returned once at creation; hashing stays in auth service, not callers.
  rpc CreateAPIKey(CreateAPIKeyRequest) returns (CreateAPIKeyResponse);
  rpc ListAPIKeys(ListAPIKeysRequest) returns (ListAPIKeysResponse);
  // Machine clients authenticate self-serve HTTP with X-API-Key.
  rpc VerifyAPIKey(VerifyAPIKeyRequest) returns (VerifyAPIKeyResponse);

  // Old-password check blocks takeover when a session is already compromised.
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);

  // Short-lived single-use token; email delivery is caller responsibility in production.
  rpc RequestEmailVerification(RequestEmailVerificationRequest) returns (RequestEmailVerificationResponse);
  rpc ConfirmEmailVerification(ConfirmEmailVerificationRequest) returns (ConfirmEmailVerificationResponse);
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string role = 3;
  string customer_id = 4;
}

message RegisterResponse {
  string user_id = 1;
}

message LoginRequest {
  string email = 1;
  string password = 2;
  int32 duration_hours = 3;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  User user = 3;
}

message User {
  string id = 1;
  string email = 2;
  string role = 3;
  string customer_id = 4;
  google.protobuf.Timestamp created_at = 5;
}

message VerifyTokenRequest {
  string access_token = 1;
}

message VerifyTokenResponse {
  User user = 1;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message RevokeTokenRequest {
  string refresh_token = 1;
}

message RevokeTokenResponse {}

// API Key management (DB schema was already present; these RPCs make it usable)
message CreateAPIKeyRequest {
  string name = 1;
  google.protobuf.Timestamp expires_at = 2; // optional
}

message CreateAPIKeyResponse {
  string id = 1;
  string name = 2;
  string raw_key = 3;          // ONLY returned once, at creation time. Client must store it.
  google.protobuf.Timestamp expires_at = 4;
}

message ListAPIKeysRequest {}

message ListAPIKeysResponse {
  repeated APIKey keys = 1;
}

message APIKey {
  string id = 1;
  string name = 2;
  google.protobuf.Timestamp expires_at = 3;
  google.protobuf.Timestamp created_at = 4;
}

message VerifyAPIKeyRequest {
  string api_key = 1;
}

message VerifyAPIKeyResponse {
  User user = 1;
}

// Password & email lifecycle
message ChangePasswordRequest {
  string old_password = 1;
  string new_password = 2;
}

message ChangePasswordResponse {}

message RequestEmailVerificationRequest {}

message RequestEmailVerificationResponse {
  // In production the token is sent via email by the caller (management gateway).
  // For internal tests/dev the token is returned here.
  string verification_token = 1;
}

message ConfirmEmailVerificationRequest {
  string verification_token = 1;
}

message ConfirmEmailVerificationResponse {}
