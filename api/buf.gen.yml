# Generated files land in api/gen/ only. Never set out to ., .., or /.
# Sync into internal/*/pb via scripts/codegen/gen.sh (safe_sync_proto_gen).
version: v1
plugins:
  - plugin: buf.build/protocolbuffers/go
    out: gen
    opt:
      - module=espx
  - plugin: buf.build/grpc/go
    out: gen
    opt:
      - module=espx
  - name: go-vtproto
    out: gen
    opt:
      - module=espx
      - features=marshal+unmarshal+size+pool
