syntax = "proto3";

package settlement;

option go_package = "espx/internal/management/pb;pb";

service SettlementService {
  // Called from payment outbox; ledger idempotency makes retries safe after transient gRPC failures.
  rpc ApplyPaymentCredit(ApplyPaymentCreditRequest) returns (ApplyPaymentCreditResponse);

  // Called from payment outbox on Stripe refund webhooks; debits balance idempotently by refund id.
  rpc ApplyPaymentRefund(ApplyPaymentRefundRequest) returns (ApplyPaymentRefundResponse);

  // Called from payment outbox when Stripe withdraws disputed funds from the platform account.
  rpc ApplyPaymentChargeback(ApplyPaymentChargebackRequest) returns (ApplyPaymentChargebackResponse);

  // Called from payment outbox when Stripe reinstates funds after a won dispute.
  rpc ApplyPaymentChargebackReversal(ApplyPaymentChargebackReversalRequest) returns (ApplyPaymentChargebackReversalResponse);

  // Read-only ledger lookup by payment_intent_id for payment financial recon.
  rpc GetLedgerEntry(GetLedgerEntryRequest) returns (GetLedgerEntryResponse);

  // BlockIP enqueues a fraud blacklist update via management outbox (internal IVT path).
  rpc BlockIP(BlockIPRequest) returns (BlockIPResponse);

  // EnqueueFraudThreat enqueues a fraud enforcement action (boost, blacklist, ghost IVT).
  rpc EnqueueFraudThreat(EnqueueFraudThreatRequest) returns (EnqueueFraudThreatResponse);

  // BatchApplySettlement drains payment outbox rows after management outages (<=500 ops per call).
  rpc BatchApplySettlement(BatchApplySettlementRequest) returns (BatchApplySettlementResponse);
}

message ApplyPaymentCreditRequest {
  string customer_id = 1;
  int64 amount_micro = 2;
  string ledger_idempotency_key = 3;  // e.g. "stripe:evt_01H..."
  string payment_intent_id = 4;
  string provider = 5;
  string provider_ref = 6;
}

message ApplyPaymentCreditResponse {
  bool applied = 1;       // false = duplicate idempotency hit (still success)
  int64 ledger_entry_id = 2;
}

message ApplyPaymentRefundRequest {
  string customer_id = 1;
  int64 amount_micro = 2;              // positive debit magnitude
  string ledger_idempotency_key = 3;   // e.g. "refund:re_01H..."
  string payment_intent_id = 4;
  string provider = 5;
  string provider_refund_id = 6;
}

message ApplyPaymentRefundResponse {
  bool applied = 1;
  int64 ledger_entry_id = 2;
}

message ApplyPaymentChargebackRequest {
  string customer_id = 1;
  int64 amount_micro = 2;
  string ledger_idempotency_key = 3;   // e.g. "chargeback:withdrawn:dp_01H..."
  string payment_intent_id = 4;
  string provider = 5;
  string provider_dispute_id = 6;
}

message ApplyPaymentChargebackResponse {
  bool applied = 1;
  int64 ledger_entry_id = 2;
}

message ApplyPaymentChargebackReversalRequest {
  string customer_id = 1;
  int64 amount_micro = 2;
  string ledger_idempotency_key = 3;   // e.g. "chargeback:reinstated:dp_01H..."
  string payment_intent_id = 4;
  string provider = 5;
  string provider_dispute_id = 6;
}

message ApplyPaymentChargebackReversalResponse {
  bool applied = 1;
  int64 ledger_entry_id = 2;
}

message GetLedgerEntryRequest {
  string payment_intent_id = 1;
}

message LedgerEntry {
  int64 id = 1;
  string customer_id = 2;
  string campaign_id = 3;
  int64 amount_micro = 4;
  string type = 5;
  string created_at = 6;
}

message GetLedgerEntryResponse {
  bool found = 1;
  LedgerEntry topup = 2;
  int64 refund_total_micro = 3;
  int64 chargeback_total_micro = 4;
  int64 chargeback_reversal_total_micro = 5;
}

message BlockIPRequest {
  string ip = 1;
  string source = 2; // e.g. "fraud"
}

message BlockIPResponse {
  bool enqueued = 1;
}

message EnqueueFraudThreatRequest {
  string action = 1;      // e.g. "boost", "blacklist", "ghost"
  string ip = 2;
  string campaign_id = 3;
  double score = 4;
  int32 boost = 5;
  int64 ttl_seconds = 6;
}

message EnqueueFraudThreatResponse {
  bool enqueued = 1;
}

message BatchApplySettlementRequest {
  repeated ApplyPaymentCreditRequest credits = 1;
  repeated ApplyPaymentRefundRequest refunds = 2;
  repeated ApplyPaymentChargebackRequest chargebacks = 3;
  repeated ApplyPaymentChargebackReversalRequest chargeback_reversals = 4;
}

message BatchSettlementItemResult {
  bool applied = 1;
  int64 ledger_entry_id = 2;
  string error = 3; // empty on success
}

message BatchApplySettlementResponse {
  repeated BatchSettlementItemResult credit_results = 1;
  repeated BatchSettlementItemResult refund_results = 2;
  repeated BatchSettlementItemResult chargeback_results = 3;
  repeated BatchSettlementItemResult chargeback_reversal_results = 4;
}
