syntax = "proto3";

package notifier;

option go_package = "espx/internal/notifier/pb;pb";

import "google/protobuf/timestamp.proto";

service NotifierService {
  // Enqueues a notification to be sent asynchronously.
  rpc SendNotification(SendNotificationRequest) returns (SendNotificationResponse);

  // Enqueues multiple notifications in one RPC.
  rpc SendNotificationBatch(SendNotificationBatchRequest) returns (SendNotificationBatchResponse);

  // Retrieves the status of a specific notification.
  rpc GetNotification(GetNotificationRequest) returns (GetNotificationResponse);
}

enum Provider {
  PROVIDER_UNSPECIFIED = 0;
  PROVIDER_TELEGRAM = 1;
  PROVIDER_SLACK = 2;
  PROVIDER_SMTP = 3;
  PROVIDER_SMS = 4;
}

enum NotificationStatus {
  NOTIFICATION_STATUS_UNSPECIFIED = 0;
  NOTIFICATION_STATUS_PENDING = 1;
  NOTIFICATION_STATUS_SENT = 2;
  NOTIFICATION_STATUS_FAILED = 3;
  NOTIFICATION_STATUS_PROCESSING = 4;
}

// DeliveryMode controls single-channel fallback vs parallel multi-channel fan-out.
enum DeliveryMode {
  DELIVERY_MODE_UNSPECIFIED = 0; // treated as FALLBACK
  DELIVERY_MODE_FALLBACK = 1;
  DELIVERY_MODE_BROADCAST = 2;
}

message SendNotificationRequest {
  Provider provider = 1;
  string recipient = 2; // e.g. chat_id, webhook URL, or email address
  string title = 3;     // optional (e.g. subject line for email)
  string body = 4;      // message content (HTML for Telegram, Markdown for Slack, HTML/Text for Email)
  DeliveryMode delivery_mode = 5;
  repeated Provider broadcast_providers = 6; // optional subset; empty = all configured providers
  string dedup_key = 7; // optional; suppresses duplicate enqueue within cooldown window
}

message SendNotificationBatchRequest {
  repeated SendNotificationRequest notifications = 1;
}

message SendNotificationBatchResponse {
  repeated SendNotificationResponse notifications = 1;
}

message SendNotificationResponse {
  string notification_id = 1;
  NotificationStatus status = 2;
  bool deduplicated = 3;
}

message GetNotificationRequest {
  string notification_id = 1;
}

message GetNotificationResponse {
  Notification notification = 1;
}

message Notification {
  string id = 1;
  Provider provider = 2;
  string recipient = 3;
  string title = 4;
  string body = 5;
  NotificationStatus status = 6;
  int32 retry_count = 7;
  string error_message = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
  DeliveryMode delivery_mode = 11;
  repeated Provider broadcast_providers = 12;
  string dedup_key = 13;
}
