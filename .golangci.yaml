linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - revive
    - unused
    - misspell

run:
  timeout: 5m
  go: '1.25.12'

linters-settings:
  revive:
    rules:
      - name: exported
        disabled: true
  staticcheck:
    # R11.2: SA9003 empty branch, SA4017 crypto/rand misuse (+ default staticcheck suite).
    checks:
      - all
      - SA9003
      - SA4017

issues:
  exclude-rules:
    - path: '_test\.go'
      linters:
        - errcheck
        - revive
    - path: '(/|^)(.*/)?pb/'
      linters:
        - errcheck
    - path: '(/|^)(.*/)?db/'
      linters:
        - errcheck
